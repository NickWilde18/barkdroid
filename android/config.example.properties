# Android build config — copy this to config.properties and fill in your values.
# This file is git-ignored.

# Your custom application ID (package name). Must match your JPush app config.
APPLICATION_ID=com.example.barkdroid

# JPush AppKey — safe to embed in APK (only used for device registration, not sending).
# Get this from https://portal.jiguang.cn
JPUSH_APP_KEY=

# Your barkdroid server URL (must be reachable from the Android device).
SERVER_BASE_URL=http://10.0.2.2:8080

# Optional: auth token if your server requires it.
SERVER_TOKEN=
